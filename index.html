<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    font-family: Arial;
    text-align: center;

    background: url('imagem-engrenagem.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* camada branca suave por cima da imagem */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(245,245,245,0.9);
    backdrop-filter: blur(3px);
    z-index: -1;
}

.painel button {
    padding: 12px 20px;
    margin: 6px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    background: #ccc;
    color: black;
    transition: all 0.2s;
}

.ativo {
    background: #1ec31e;
    color: white;
    transform: scale(1.05);
}

#setor {
    font-size: 22px;
    margin: 10px;
    font-weight: bold;
}

input {
    padding: 10px;
    width: 300px;
}

#sugestoes {
    width: 320px;
    margin: auto;
    border: 1px solid #ccc;
    background: white;
    max-height: 200px;
    overflow: auto;
}

.sug {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.sug:hover {
    background: #eee;
}

.grid {
    display: grid;
    gap: 6px;
    justify-content: center;
    margin-top: 30px;
}

.cel {
    border: 1px solid black;
    padding: 14px;
    background: white;
    min-width: 60px;
    transition: all 0.2s;
}

.ok {
    background: lime;
    font-weight: bold;
}

.baixo {
    background: red;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Endereçamento de Estoque</h2>

<div class="painel">
    <button onclick="setAba('peças elétrica e outros', this)">Peças Elétricas</button>
    <button onclick="setAba('retentores', this)">Retentores</button>
    <button onclick="setAba('conexões pneumáticas', this)">Conexões Pneumáticas</button>
    <button onclick="setAba('rolamentos', this)">Rolamentos</button>
    <button onclick="setAba('bucha e rolamento especial', this)">Buchas e Rolamentos Especiais</button>
    <button onclick="setAba('rolamentos especiais', this)">Rolamentos Especiais</button>
    <button onclick="setAba('prateleira ek', this)">Prateleira EK</button>
    <button onclick="setAba('prateleira gd', this)">Prateleira GD</button>
    <button onclick="setAba('prateleira ew', this)">Prateleira EW</button>
    <button onclick="setAba('prateleira uniplast/cozinhador', this)">Prateleira Uniplast/Coz</button>
    <button onclick="setAba('prateleira flowpack', this)">Prateleira Flowpack</button>
</div>

<div id="setor"><br>Nenhum setor selecionado</div>

<br>

<input id="busca" placeholder="Digite código ou descrição">

<div id="sugestoes"></div>
<br>
<div id="info"></div>
<br>
<div id="mapa" class="grid"></div>

<script>
const api = "https://script.google.com/macros/s/AKfycbzTrCIYk4dE2BDS_5_GF5e0PM0o-vF9_mm84tBWnyojMQZBId4pG7s1wJMYplvfWiXx/exec";

let abaAtual = "";
let letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let digitando = true;
let totalPratGlobal = 0;
let totalCabGlobal = 0;

busca.addEventListener("keyup", sugerir);

function setAba(nome, btn){
    abaAtual = nome;

    document.querySelectorAll(".painel button").forEach(b => b.classList.remove("ativo"));
    btn.classList.add("ativo");

    setor.innerHTML = "<br>Setor atual: " + nome;

    info.innerHTML = "";
    sugestoes.innerHTML = "";

    carregarMapaCompleto();
}

async function carregarMapaCompleto(){
    try{
        let res = await fetch(api + "?aba=" + encodeURIComponent(abaAtual));
        let json = await res.json();

        totalPratGlobal = json.totalPrateleiras || 9;
        totalCabGlobal = json.totalCabides || 10;

        desenharMapaCompleto(totalPratGlobal, totalCabGlobal);
    }catch(err){
        console.error(err);
    }
}

async function sugerir(){
    if(!abaAtual || !digitando) return;

    let termo = busca.value;
    if(termo.length < 2){
        sugestoes.innerHTML = "";
        return;
    }

    try{
        let res = await fetch(api + "?aba=" + encodeURIComponent(abaAtual) + "&q=" + encodeURIComponent(termo));
        let json = await res.json();

        let itens = json.itens || [];

        sugestoes.innerHTML = "";

        itens.forEach(item=>{
            let d = document.createElement("div");
            d.className = "sug";
            d.innerHTML = item.codigo + " - " + item.descricao;

            d.onclick = ()=>{
                digitando = false;
                sugestoes.innerHTML = "";
                busca.value = item.descricao;
                mostrarItem(item);
                setTimeout(()=>digitando=true, 400);
            }

            sugestoes.appendChild(d);
        });

    }catch(err){
        console.error(err);
    }
}

function mostrarItem(item){
    document.querySelectorAll(".cel").forEach(c => c.classList.remove("ok","baixo"));

    let letra = isNaN(item.prateleira) ? item.prateleira : letras[item.prateleira-1];

    info.innerHTML = `
        <b>${item.descricao}</b><br>
        Código: ${item.codigo}<br>
        Local: ${letra}-${item.cabide}<br>
        Estoque: ${item.estoqueAtual}
    `;

    let pIndex = isNaN(item.prateleira) ? letras.indexOf(letra)+1 : Number(item.prateleira);
    let cIndex = Number(item.cabide);

    let cabMin = Math.max(1, cIndex - ((cIndex - 1) % 10));
    let cabMax = Math.min(totalCabGlobal, cabMin + 9);

    desenharMapaFaixa(pIndex, cabMin, cabMax);

    let cel = document.getElementById("p"+pIndex+"c"+cIndex);
    if(!cel) return;

    if(item.estoqueAtual <= item.estoqueMin) cel.classList.add("baixo");
    else cel.classList.add("ok");
}

function desenharMapaCompleto(pMax, cMax){
    mapa.innerHTML="";
    mapa.style.gridTemplateColumns = `repeat(${cMax},60px)`;

    for(let p=1;p<=pMax;p++){
        for(let c=1;c<=cMax;c++){
            let div = document.createElement("div");
            div.className = "cel";
            div.id = "p"+p+"c"+c;
            div.innerHTML = letras[p-1]+"-"+c;
            mapa.appendChild(div);
        }
    }
}

function desenharMapaFaixa(prat, cabMin, cabMax){
    mapa.innerHTML="";
    let cabTotal = cabMax - cabMin + 1;
    mapa.style.gridTemplateColumns = `repeat(${cabTotal},60px)`;

    for(let c=cabMin;c<=cabMax;c++){
        let div = document.createElement("div");
        div.className = "cel";
        div.id = "p"+prat+"c"+c;
        div.innerHTML = letras[prat-1]+"-"+c;
        mapa.appendChild(div);
    }
}

busca.addEventListener("focus", ()=>digitando=true);
</script>

</body>
</html>
