<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/png" sizes="128x128" href="estoque.png">    
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

body {
    font-family: Arial;
    text-align: center;

    background:
        radial-gradient(circle at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%),
        url('imagem-engrenagem.jpg') no-repeat center center;

    background-size: cover;
    background-attachment: fixed;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(2px);
    z-index: 0;
}

body * {
    position: relative;
    z-index: 1;
}

h2 {
    color: rgb(3, 3, 3);
    text-shadow: 
        -1px -1px 0 #ffffff,
         1px -1px 0 #ffffff,
        -1px  1px 0 #ffffff,
         1px  1px 0 #ffffff;
}

.painel button {
    padding: 12px 20px;
    margin: 6px;
    border: 2px solid black;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    background: #ccc;
}

.painel button:hover {
    background: #bbb;
    transform: scale(1.03);
}

.ativo {
    background: #1ec31e;
    color: black;
    transform: scale(1.05);
}

#setor, #info {
    color: rgb(3, 3, 3);
    text-shadow: 
        -1px -1px 0 #ffffff,
         1px -1px 0 #ffffff,
        -1px  1px 0 #ffffff,
         1px  1px 0 #ffffff;
}

#setor {
    font-size: 22px;
    margin: 10px;
    font-weight: bold;
}

#info {
    margin-top: 35px;
    font-size: 20px;
    font-weight: bold;
}

input {
    padding: 10px;
    width: 300px;
}

#sugestoes {
    width: 320px;
    margin: auto;
    border: 1px solid #ccc;
    background: white;
    max-height: 200px;
    overflow: auto;
    font-size: 16px;
}

.sug {
    padding: 16px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.sug:hover {
    background: #eee;
}

.grid {
    display: grid;
    gap: 14px;
    justify-content: center;
    margin-top: 30px;
}

.cel {
    width: 65px;
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    border-radius: 12px;
    font-weight: bold;
    color: #333;
    border: 1px solid #ddd;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    transition: all 0.2s ease;
}

.cel:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.ok {
    background: #28a745;
    color: white;
}

.baixo {
    background: #dc3545;
    color: white;
}
</style>
</head>

<body>

<h2>Endereçamento de Estoque</h2>

<div class="painel">
     <button onclick="setAba('peças elétrica e outros', this)">Peças Elétricas</button>
    <button onclick="setAba('retentores', this)">Retentores</button>
    <button onclick="setAba('conexões pneumáticas', this)">Conexões Pneumáticas</button>
    <button onclick="setAba('rolamentos', this)">Rolamentos</button>
    <button onclick="setAba('bucha e rolamentos especial', this)">Buchas e Rolamentos Especiais</button>
    <button onclick="setAba('rolamentos especiais', this)">Rolamentos Especiais</button>
    <button onclick="setAba('válvulas, vedações e outros', this)">Válvulas, Vedações e Outros</button>
    <button onclick="setAba('manípulos, facas novas e afiadas', this)">Manípulos, facas novas e afiadas</button>
    <button onclick="setAba('prateleira ek', this)">Prateleira EK</button>
    <button onclick="setAba('prateleira gd', this)">Prateleira GD</button>
    <button onclick="setAba('prateleira ew', this)">Prateleira EW</button>
    <button onclick="setAba('prateleira uniplast/cozinhador', this)">Prateleira Uniplast/Coz</button>
    <button onclick="setAba('prateleira flowpack', this)">Prateleira Flowpack</button>
    <button onclick="setAba('selos e gaxeta', this)">Selos, gaxeta e bomba</button>
    <button onclick="setAba('sensor, resistência e cabo', this)">Elétrica</button>
    <button onclick="setAba('disjuntor, relé e outros', this)">Elétrica-2</button>
    <button onclick="setAba('corrente, emenda e mangueira', this)">Correntes</button>
    <button onclick="setAba('manômetro e polia', this)">Manômetro e Polias</button>
    <button onclick="setAba('esteiras', this)">Esteiras e Correias</button>
</div>

<div id="setor"><br>Nenhum setor selecionado</div>

<br>

<input id="busca" placeholder="Digite código ou descrição">

<div id="buscaMedidas" style="display:none; margin-top:10px;">
    <input id="interno" placeholder="Interno (mm)" type="number">
    <input id="externo" placeholder="Externo (mm)" type="number">
    <input id="altura" placeholder="Altura (mm)" type="number">
    <br><br>
    <button onclick="buscarPorMedidas()">Buscar por medidas</button>
    <br><br>
    <button onclick="buscarMedidasGlobal()">Onde está meu rolamento?</button>
    <br><br>
</div>

<div id="buscaLarguraCompr" style="display:none; margin-top:10px;">
    <input id="comprimento" placeholder="Comprimento (mm)" type="number">
    <input id="largura" placeholder="Largura (mm)" type="number">
    <br><br>
    <button onclick="buscarComprLarg()">Buscar por Medidas</button>
    <br><br>
</div>

<div id="sugestoes"></div>
<br>
<div id="info"></div>
<br>
<div id="mapa" class="grid"></div>

<script>
const api = "https://script.google.com/macros/s/AKfycbwIIcM00F_OwGqybanRsxwMY2EhfXnPv2s2xBhh0rh87xKBQyzC9SqRnK6W82Xq0pdH/exec";

let abaAtual = "";
let letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let digitando = true;
let totalPratGlobal = 0;
let totalCabGlobal = 0;

let debounceTimer;
let ultimaBusca = 0;

busca.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        sugerir();
    }, 40);
});

function setAba(nome, btn){
    abaAtual = nome;

    document.querySelectorAll(".painel button").forEach(b => b.classList.remove("ativo"));
    btn.classList.add("ativo");

    setor.innerHTML = "<br>Setor atual: " + nome;

    info.innerHTML = "";
    sugestoes.innerHTML = "";

    //CONTROLE ROLAMENTOS
    if(nome.toLowerCase().includes("rolamentos")){
        document.getElementById("buscaMedidas").style.display = "block";
    } else {
        document.getElementById("buscaMedidas").style.display = "none";
    }

    carregarMapaCompleto();

    //CONTROLE ESTEIRAS
    if(nome.toLowerCase().includes("esteiras")){
        document.getElementById("buscaLarguraCompr").style.display = "block";
    } else {
        document.getElementById("buscaLarguraCompr").style.display = "none";
    }

    carregarMapaCompleto();
}

async function carregarMapaCompleto(){
    try{
        let res = await fetch(api + "?aba=" + encodeURIComponent(abaAtual));
        let json = await res.json();

        totalPratGlobal = json.totalPrateleiras || 9;
        totalCabGlobal = json.totalCabides || 10;

        desenharMapaCompleto(totalPratGlobal, totalCabGlobal);
    }catch(err){
        console.error(err);
    }
}

async function buscarPorMedidas(){
    let interno = document.getElementById("interno").value;
    let externo = document.getElementById("externo").value;
    let altura = document.getElementById("altura").value;
    let sugestoes = document.getElementById("sugestoes");

    if(!interno || !externo || !altura){
        alert("Preencha todos os campos!");
        return;
    }

    try{
        let res = await fetch(
            api +
            "?aba=" + encodeURIComponent(abaAtual) +
            "&interno=" + encodeURIComponent(interno) +
            "&externo=" + encodeURIComponent(externo) +
            "&altura=" + encodeURIComponent(altura)
        );

        let json = await res.json();
        let itens = json.itens || [];

        sugestoes.innerHTML = "";
        
        if(itens.length === 0){
            let d = document.createElement("div");
            d.className = "sug";
            d.innerText = "Nenhum item com essas medidas";
            sugestoes.appendChild(d);
            return;
        }

        itens.forEach(item=>{
            let d = document.createElement("div");
            d.className = "sug";
            d.innerHTML = item.codigo + " - " + item.descricao;
            d.onclick = ()=>{
                mostrarItem(item);
            };
            sugestoes.appendChild(d);
        });
    }catch(err){
        console.error(err);
    }
}

async function buscarComprLarg() {

    let comprimento = document.getElementById("comprimento").value;
    let largura = document.getElementById("largura").value;
    let sugestoes = document.getElementById("sugestoes");

    if (!comprimento || !largura) {
        alert("Preencha todos os campos!");
        return;
    }

    try {
        let res = await fetch(
            api +
            "?aba=" + encodeURIComponent(abaAtual) +
            "&comprimento=" + encodeURIComponent(comprimento) +
            "&largura=" + encodeURIComponent(largura)
        );

        let json = await res.json();
        let itens = json.itens || [];
        sugestoes.innerHTML = "";

        if (itens.length === 0) {
        let d = document.createElement("div");
        d.className = "sug";
        d.innerText = "Nenhum item com essas medidas";
        sugestoes.appendChild(d);
         return; // importante pra não continuar
        }
        
        itens.forEach(item => {
            let d = document.createElement("div");
            d.className = "sug";
            d.innerHTML = item.codigo + " - " + item.descricao;

            d.onclick = () => {
                mostrarItem(item); // ajuste se necessário
            };

            sugestoes.appendChild(d);
        });

    } catch (err) {
        console.error(err);
    }
}

async function sugerir(){
    if(!abaAtual || !digitando) return;

    let termo = busca.value;
    if(termo.length < 2){
        sugestoes.innerHTML = "";
        return;
    }

    let idBusca = Date.now();
    ultimaBusca = idBusca;

    try{
        let res = await fetch(api + "?aba=" + encodeURIComponent(abaAtual) + "&q=" + encodeURIComponent(termo));
        let json = await res.json();

        if(idBusca !== ultimaBusca) return;

        let itens = json.itens || [];

        sugestoes.innerHTML = "";

        itens.forEach(item=>{
            let d = document.createElement("div");
            d.className = "sug";
            d.innerHTML = item.codigo + " - " + item.descricao;

            d.onclick = ()=>{
                digitando = false;
                sugestoes.innerHTML = "";
                busca.value = item.descricao;
                mostrarItem(item);
                setTimeout(()=>digitando=true, 400);
            }

            sugestoes.appendChild(d);
        });

    }catch(err){
        console.error(err);
    }
}

async function buscarMedidasGlobal(){
    let interno = document.getElementById("interno").value;
    let externo = document.getElementById("externo").value;
    let altura = document.getElementById("altura").value;
    let sugestoes = document.getElementById("sugestoes");

    if(!interno || !externo || !altura){
        alert("Preencha todos os campos!");
        return;
    }

    try{
        let res = await fetch(
            api +
            "?global=true" +
            "&interno=" + encodeURIComponent(interno) +
            "&externo=" + encodeURIComponent(externo) +
            "&altura=" + encodeURIComponent(altura)
        );

        let json = await res.json();
        let itens = json.itens || [];

        sugestoes.innerHTML = "";

        if(itens.length === 0){
            let d = document.createElement("div");
            d.className = "sug";
            d.innerText = "Nenhum item encontrado em nenhum setor";
            sugestoes.appendChild(d);
            return;
        }

        itens.forEach(item=>{
    let d = document.createElement("div");
    d.className = "sug";

    d.innerHTML = `
        <b>${item.codigo}</b> - ${item.descricao}<br>
        <small>Setor: ${item.setor} | Local: ${item.prateleira}-${item.cabide}</small>
    `;

    d.onclick = ()=>{
        abaAtual = item.setor;
        setor.innerHTML = "<br>Setor atual: " + item.setor;

         mostrarItem(item); // direto
    };

    sugestoes.appendChild(d);
});

    }catch(err){
        console.error(err);
    }
}

function mostrarItem(item){
    document.querySelectorAll(".cel").forEach(c => c.classList.remove("ok","baixo"));

    let letra = isNaN(item.prateleira) ? item.prateleira : letras[item.prateleira-1];

    info.innerHTML = `
        ${item.descricao}<br>
        Código: ${item.codigo}<br>
        Local: ${letra} - ${item.cabide}<br>
        Estoque: ${item.estoqueAtual}
    `;

    let pIndex = isNaN(item.prateleira) ? letras.indexOf(letra)+1 : Number(item.prateleira);
    let cIndex = Number(item.cabide);

    let cabMin = Math.max(1, cIndex - ((cIndex - 1) % 10));
    let cabMax = Math.min(totalCabGlobal, cabMin + 9);

    desenharMapaFaixa(pIndex, cabMin, cabMax);

    let cel = document.getElementById("p"+pIndex+"c"+cIndex);
    if(!cel) return;

    if(item.estoqueAtual <= item.estoqueMin) cel.classList.add("baixo");
    else cel.classList.add("ok");
}

function desenharMapaCompleto(pMax, cMax){
    mapa.innerHTML="";
    mapa.style.gridTemplateColumns = `repeat(${cMax},65px)`;

    for(let p=1;p<=pMax;p++){
        for(let c=1;c<=cMax;c++){
            let div = document.createElement("div");
            div.className = "cel";
            div.id = "p"+p+"c"+c;
            div.innerHTML = letras[p-1]+"-"+c;
            mapa.appendChild(div);
        }
    }
}

function desenharMapaFaixa(prat, cabMin, cabMax){
    mapa.innerHTML="";
    let cabTotal = cabMax - cabMin + 1;
    mapa.style.gridTemplateColumns = `repeat(${cabTotal},65px)`;

    for(let c=cabMin;c<=cabMax;c++){
        let div = document.createElement("div");
        div.className = "cel";
        div.id = "p"+prat+"c"+c;
        div.innerHTML = letras[prat-1]+"-"+c;
        mapa.appendChild(div);
    }
}

busca.addEventListener("focus", ()=>digitando=true);
</script>

</body>
</html>
